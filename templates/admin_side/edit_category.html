<!DOCTYPE html>
<html>

<head>
    <title>{% if category %}Edit{% else %}Add{% endif %} Category</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            width:400px;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2c3e50;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d2935;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            color:#2c3e50;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>{% if category %}Edit{% else %}Add{% endif %} Category</h2>

    <form method="post">
        {% csrf_token %}

        <input
            type="text"
            name="name"
            value="{{ category.name|default:'' }}"
            placeholder="Category Name"
            required>

        <button type="submit">
            {% if category %}Update Category{% else %}Save Category{% endif %}
        </button>
    </form>

    <a class="back" href="{% url 'category_list' %}">
        ← Back to Categories
    </a>

</div>

</body>

</html>
