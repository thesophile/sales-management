<!DOCTYPE html>
<html>

<head>
    <title>Change Password</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            background:white;
            width:450px;
            max-width:90%;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:25px;
        }

        form p{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        ul.errorlist{
            color:#e74c3c;
            margin:5px 0;
            padding-left:18px;
            font-size:14px;
        }

        .helptext{
            display:block;
            font-size:13px;
            color:#666;
            margin-top:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2c3e50;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
            margin-top:10px;
        }

        button:hover{
            background:#1d2935;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            color:#2c3e50;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Change Password</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Update Password</button>
    </form>

    <a class="back" href="{% url 'admin' %}">
        ← Back to Dashboard
    </a>

</div>

</body>

</html>
