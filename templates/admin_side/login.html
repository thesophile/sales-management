<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            width:400px;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2c3e50;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d2935;
        }

        .error{
            margin-top:18px;
            color:#e74c3c;
            text-align:center;
            font-weight:bold;
        }

        .demo{
            margin-top:20px;
            padding:12px;
            background:#eef3f7;
            border-left:4px solid #2c3e50;
            border-radius:5px;
            font-size:14px;
            color:#333;
        }

        .demo strong{
            color:#2c3e50;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Admin Login</h2>

    <form method="post">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Log In</button>
    </form>

    {% if form.errors %}
        <div class="error">
            Invalid username or password.
        </div>
    {% endif %}

    <div class="demo">
        <strong>Demo Credentials</strong><br><br>
        Username: <strong>staff1</strong><br>
        Password: <strong>Pass@123</strong>
    </div>

</div>

</body>

</html>
