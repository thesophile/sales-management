<form method="post">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit">Log in</button>
</form>
{% if form.errors %}
    <p>Invalid username or password.</p>
{% endif %}
