<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.card{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
}
input{
    width:100%;
    padding:10px;
    margin:20px 0;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    width:100%;
    padding:12px;
    background:#2c3e50;
    color:white;
    border:none;
    border-radius:5px;
}
</style>

<div class="card">

<h2>{% if category %}Edit{% else %}Add{% endif %} Category</h2>

<form method="post">
{% csrf_token %}

<input
type="text"
name="name"
value="{{ category.name|default:'' }}"
placeholder="Category Name"
required>

<button>Save</button>

</form>

</div>
