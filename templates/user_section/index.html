<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:#2c3e50;
            color:white;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        header a{
            color:white;
            text-decoration:none;
        }

        .categories{
            display:flex;
            gap:10px;
            padding:20px 40px;
            flex-wrap:wrap;
        }

        .categories a{
            text-decoration:none;
            background:white;
            color:#333;
            padding:8px 16px;
            border-radius:20px;
            box-shadow:0 2px 5px rgba(0,0,0,.1);
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
            gap:25px;
            padding:20px 40px;
        }

        .card{
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .card-body{
            padding:15px;
        }

        .price{
            color:#0a8d48;
            font-size:22px;
            font-weight:bold;
            margin:10px 0;
        }

        .category{
            color:#666;
            margin-bottom:15px;
        }

        .btn{
            display:inline-block;
            background:#2c3e50;
            color:white;
            padding:10px 18px;
            border-radius:5px;
            text-decoration:none;
        }

        .btn:hover{
            background:#1d2935;
        }
    </style>
</head>

<body>

<header>
    <h2>Hello, USER!</h2>
    <a href="/admin_side">Admin Panel</a>
</header>

<div class="categories">
    <a href="{% url 'index' %}">All</a>

    {% for cat in categories %}
        <a href="{% url 'index' %}?category={{ cat.id }}">
            {{ cat.name }}
        </a>
    {% endfor %}
</div>

<div class="products">

{% for product in products %}

<div class="card">

    <img src="{{ product.image.url }}" alt="{{ product.Title }}">

    <div class="card-body">
        <h3>{{ product.Title }}</h3>

        <div class="price">
            ₹{{ product.amount }}
        </div>

        <div class="category">
            {{ product.category.name }}
        </div>

        <a class="btn" href="{% url 'enquiry_form' product.id %}">
            Enquiry
        </a>
    </div>

</div>

{% endfor %}

</div>

</body>
</html>
