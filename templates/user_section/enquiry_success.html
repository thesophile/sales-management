<!DOCTYPE html>
<html>
<head>
    <title>Enquiry Submitted</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
            max-width:450px;
        }

        h2{
            color:#2c3e50;
            margin-bottom:15px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        a{
            display:inline-block;
            padding:12px 20px;
            background:#2c3e50;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        a:hover{
            background:#1d2935;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Enquiry Submitted Successfully!</h2>
    <p>Thank you. We have received your enquiry and will contact you soon.</p>

    <a href="{% url 'index' %}">Back to Products</a>
</div>

</body>
</html>
