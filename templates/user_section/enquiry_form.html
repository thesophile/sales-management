<h2>Enquiry for {{ product.Title }}</h2>

<form method="post" class="enquiry-form">
    {% csrf_token %}
    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-group">
        <label>Address</label>
        <textarea name="address" required></textarea>
    </div>

    <div class="form-group">
        <label>Quantity</label>
        <input type="number" name="quantity" min="1" required>
    </div>

    <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" name="mobile_number" pattern="[0-9]{10}" required>
    </div>

    <button type="submit">Submit Enquiry</button>
</form>

<style>
    .enquiry-form {
        display: flex;
        flex-direction: column;
        max-width: 400px;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 12px;
    }
    .form-group label {
        margin-bottom: 4px;
        font-weight: bold;
    }
    .form-group input,
    .form-group textarea {
        padding: 8px;
        font-size: 1rem;
    }
</style>
