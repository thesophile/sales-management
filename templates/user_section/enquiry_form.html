<!DOCTYPE html>
<html>
<head>
    <title>Enquiry</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:100%;
            max-width:500px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        h2{
            margin-bottom:25px;
            color:#2c3e50;
            text-align:center;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input,
        textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        textarea{
            resize:vertical;
            min-height:90px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2c3e50;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d2935;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Enquiry for {{ product.Title }}</h2>

<form method="post">
    {% csrf_token %}

    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-group">
        <label>Address</label>
        <textarea name="address" required></textarea>
    </div>

    <div class="form-group">
        <label>Quantity</label>
        <input type="number" name="quantity" min="1" required>
    </div>

    <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" name="mobile_number" pattern="[0-9]{10}" required>
    </div>

    <button type="submit">Submit Enquiry</button>

</form>

</div>

</body>
</html>
