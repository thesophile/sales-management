<!DOCTYPE html>
<html>

<head>
    <title>Sales Management Software</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            background:white;
            width:450px;
            max-width:90%;
            padding:40px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
            text-align:center;
        }

        h1{
            color:#2c3e50;
            margin-bottom:15px;
        }

        p{
            color:#666;
            margin-bottom:30px;
        }

        .btn{
            display:block;
            width:100%;
            padding:14px;
            margin-bottom:15px;
            background:#2c3e50;
            color:white;
            text-decoration:none;
            border-radius:5px;
            font-size:16px;
        }

        .btn:hover{
            background:#1d2935;
        }

        .admin{
            background:#34495e;
        }

        .admin:hover{
            background:#253544;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Sales Management Software</h1>

    <p>Select a section to continue.</p>

    <a class="btn" href="/user_section/">
        User Section
    </a>

    <a class="btn admin" href="/admin_side/">
        Admin Section
    </a>

</div>

</body>

</html>
